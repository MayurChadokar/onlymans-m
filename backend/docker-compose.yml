version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: onlymans-api
    container_name: onlymans-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/onlymans?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretkey
      - JWT_EXPIRES_IN=1d
    depends_on:
      - postgres
      - redis
    networks:
      - onlymans-network

  postgres:
    image: postgres:15-alpine
    container_name: onlymans-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: onlymans
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - onlymans-network

  redis:
    image: redis:7-alpine
    container_name: onlymans-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - onlymans-network

  nginx:
    image: nginx:alpine
    container_name: onlymans-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - onlymans-network

networks:
  onlymans-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
